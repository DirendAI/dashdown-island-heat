# Builds the dashboard's static export in CI and publishes it to GitHub Pages.
#
# The build runs `dashdown build dashboard --out site` against the committed
# data/heat.duckdb. With the MISTRAL_API_KEY repo secret set, the build also
# bakes the AI commentary (<Ask> blocks and chart `explain` footers) into the
# export; without it the site still builds — AI cards show a muted
# "commentary not available" note instead (never a build failure).
#
# ONE-TIME SETUP (repo admin):
# 1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
# 2. Settings → Environments → github-pages → Deployment branches: allow `main`
#    (the auto-created rule may be pinned to the branch that was default when
#    Pages was first enabled).
# 3. Settings → Secrets and variables → Actions → New repository secret:
#    MISTRAL_API_KEY (optional — enables the baked AI commentary).
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "data/heat.duckdb"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dashdown (with Mistral extra for AI commentary)
        run: pipx install 'dashdown-md[mistral]'

      - name: Build static site (bakes query snapshots + AI commentary)
        run: dashdown build dashboard --out site
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

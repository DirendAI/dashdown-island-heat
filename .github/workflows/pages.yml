# Publishes the committed static export (site/) to GitHub Pages.
#
# The site is built locally — `dashdown build dashboard --out site` — because the
# build pre-renders query snapshots from data/heat.duckdb, which is gitignored
# (reproducible via `heat-island add-city`). CI therefore only uploads the
# committed artifact; it never needs the pipeline or the database.
#
# ONE-TIME SETUP: configure-pages tries to enable Pages automatically
# (enablement: true), but many org policies block the workflow token from
# creating the Pages site ("Resource not accessible by integration"). If the
# first run fails that way, a repo admin must enable it once in
# Settings → Pages → Build and deployment → Source: "GitHub Actions",
# then re-run this workflow (or push any site/ change).

name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

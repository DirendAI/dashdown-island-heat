title: Urban Heat Islands

# AI commentary (<Ask> blocks + chart `explain` buttons). The key comes from the
# environment: locally `export MISTRAL_API_KEY=...`, in CI the repo secret.
# Absent/invalid key never breaks serve or build — AI cards show a muted note.
llm:
  provider: mistral
  api_key: ${MISTRAL_API_KEY}
agents: [claude]   # coding-agent guides to keep in sync via `dashdown skill`

branding:
  # Heat-appropriate chart series palette (hot red → cool blue → warm orange → green).
  palette: ["#e45756", "#4c78a8", "#f58518", "#54a24b"]

# Anonymous usage telemetry stays at its default (on). Opt out with
# `dashdown telemetry off` / DASHDOWN_TELEMETRY=0 / DO_NOT_TRACK=1.
